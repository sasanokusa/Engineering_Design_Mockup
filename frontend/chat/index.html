<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>共通チャット</title>
    <link rel="stylesheet" href="/chat/styles.css" />
  </head>
  <body>
    <main class="chat-shell">
      <aside class="sidebar">
        <header class="brand">
          <div>
            <p class="eyebrow">Local School AI Platform</p>
            <h1>共通チャット</h1>
          </div>
        </header>

        <button id="new-session-button" class="new-chat-button" type="button">
          <span aria-hidden="true">+</span>
          新規チャット
        </button>

        <nav class="session-nav" aria-label="チャット履歴">
          <div class="section-heading">
            <h2>履歴</h2>
            <span id="session-count">0</span>
          </div>
          <div id="session-list" class="session-list"></div>
        </nav>

        <section class="tool-menu" aria-label="連携ツール">
          <div class="section-heading">
            <h2>ツール</h2>
            <span id="tool-count">0</span>
          </div>
          <div id="tool-link-list"></div>
        </section>
      </aside>

      <section class="chat-main">
        <header class="chat-header">
          <div>
            <p id="active-meta" class="eyebrow">チャット</p>
            <h2 id="active-title">新規チャット</h2>
          </div>
          <nav class="header-actions" aria-label="主要画面">
            <a class="secondary-link" href="/">議事録</a>
            <a class="secondary-link" href="/documents/">資料投入</a>
            <a class="secondary-link" href="/compare/">文書比較</a>
          </nav>
        </header>

        <section id="messages" class="messages" aria-live="polite"></section>

        <section id="tool-suggestions" class="tool-suggestions" hidden>
          <h3>関連ツール候補</h3>
          <div id="tool-suggestion-list"></div>
        </section>

        <section id="attachments" class="attachments" hidden>
          <h3>添付中の一時文書</h3>
          <div id="attachment-list"></div>
        </section>

        <form id="message-form" class="composer">
          <div class="composer-shell">
            <button id="attach-button" class="attach-button" type="button" title="一時文書を添付" aria-label="一時文書を添付">
              +
            </button>
            <textarea id="message-input" rows="2" placeholder="メッセージを入力"></textarea>
          </div>
          <input id="attachment-files" type="file" multiple hidden />
          <div class="composer-actions">
            <label>
              <input id="use-tools" type="checkbox" checked />
              ツール候補を表示
            </label>
            <button id="send-button" class="primary" type="submit">送信</button>
          </div>
        </form>

        <p id="error-message" class="error" hidden></p>
      </section>
    </main>

    <script src="/chat/app.js" type="module"></script>
  </body>
</html>
