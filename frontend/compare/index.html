<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>文書比較</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="top-bar">
        <div>
          <p class="eyebrow">Local School AI Platform</p>
          <h1>文書比較</h1>
        </div>
        <p class="local-note">
          処理済み文書の差分と類似箇所をローカルで確認します。
          <a href="/chat/">共通チャット</a>
          <a href="/documents/">資料投入</a>
          <a href="/">議事録</a>
        </p>
      </header>

      <section class="workspace compare-workspace">
        <form id="compare-form" class="panel">
          <h2>比較対象</h2>
          <div class="compare-actions">
            <button id="refresh-documents" type="button">文書を再読み込み</button>
            <span id="selected-count">0件選択中</span>
          </div>
          <div id="document-picker" class="document-picker"></div>
          <p id="compare-error" class="error" hidden></p>
        </form>

        <section class="panel">
          <h2>比較条件</h2>
          <label>
            比較粒度
            <select id="compare-granularity">
              <option value="chunk">チャンク</option>
              <option value="paragraph">段落</option>
              <option value="section">節</option>
              <option value="full">全文</option>
            </select>
          </label>
          <label>
            類似度しきい値
            <input id="similarity-threshold" type="number" min="0" max="1" step="0.05" value="0.35" />
          </label>
          <label>
            表示件数
            <input id="match-limit" type="number" min="1" max="100" step="1" value="20" />
          </label>
          <button id="start-compare" type="submit" class="primary" form="compare-form">比較ジョブを作成</button>
          <div class="status-box compare-status">
            <h3>状態確認</h3>
            <ul id="compare-job-list"></ul>
          </div>
        </section>
      </section>

      <section class="results-grid compare-results">
        <section>
          <h2>差分サマリ</h2>
          <div id="pair-results" class="search-results"></div>
        </section>
        <section>
          <h2>類似箇所</h2>
          <div id="similar-chunk-results" class="similar-results"></div>
        </section>
      </section>
    </main>

    <script src="/compare/app.js" type="module"></script>
  </body>
</html>
